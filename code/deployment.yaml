
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-api
  labels:
    app: devops-api
spec:
  replicas: 2                  
  selector:
    matchLabels:
      app: devops-api
  template:
    metadata:
      labels:
        app: devops-api
    spec:
      containers:
        - name: devops-api
          image: nguyenminhquan77/devops-api:v3
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: MONGO_URI
          resources:
            requests:
              cpu: "100m"       
              memory: "64Mi"
            limits:
              cpu: "200m"      
              memory: "128Mi"
          readinessProbe:         
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez          
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3 
